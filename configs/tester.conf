server {
    listen 8080;
    root ./www;

    error_page 404 ./www/errors/404.html;
    error_page 405 ./www/errors/405.html;
    error_page 403 ./www/errors/403.html;

    # / answers GET only
    location / {
        methods GET;
    }

    # /post_body answers POST with max body 100
    location /post_body {
        methods POST;
        client_max_body_size 100;
    }

    # /directory answers GET, root is YoupiBanane, default file is youpi.bad_extension
    location /directory {
        root ./www/YoupiBanane;
        methods GET;
        index youpi.bad_extension;

        cgi_ext .bla;
        cgi ./cgi_tester;
        client_max_body_size 200000000;
    }

    # /directory/ gets redirected to /directory/
    location /directory/ {
    return 301 /directory/;
    }

}