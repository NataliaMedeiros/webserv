server {
    listen 8080;
    root ./www;

    error_page 404 ./www/errors/404.html;
    error_page 405 ./www/errors/405.html;
    error_page 403 ./www/errors/403.html;

    # / must answer GET only
    location / {
        methods GET;
    }

    # /post_body accepts POST with max body 100
    location /post_body {
        methods POST;
        client_max_body_size 100;
    }


	location /directory {
    root ./www/YoupiBanane;
    methods GET POST;
    cgi ./cgi_tester;
	cgi_ext .bla;
	index youpi.bad_extension;
}

}