server {
    listen 8080;
    root ./www;
    index index.html;

    location / {
        methods GET POST DELETE;
    }

    location /images {
        root ./www/images;
        methods GET;
    }

    location /old {
        return 301 /new;
    }
    
    location /upload {
    root ./www;
    methods POST;
    upload_dir ./www/uploads;
    }
    location /files {
    root ./www/files;
    autoindex false;
    index index.html;
    methods GET;
    }
}